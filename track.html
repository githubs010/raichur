<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Track</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Track Booking</h1><input id="id" placeholder="Booking ID"><button class="btn p" onclick="t()">Track</button><div id="r" style="margin-top:16px"></div></section></main><footer class="wrap" style="padding:20px 0;border-top:1px solid #ddd;margin-top:40px"><p style="color:#999">HomeServe</p></footer><script src="api.js"></script><script>function t(){apiGet('getBookings',(e,d)=>{let b=d.find(x=>x['Booking ID']==id.value);document.getElementById('r').innerHTML=b?('<p>Status: '+badge(b['Status'])+'</p><p>Provider: '+(b['Provider']||'Not Assigned')+'</p><p>Address: '+(b['Address']||'')+'</p><p>Location: '+(b['Latitude']&&b['Longitude']?(b['Latitude']+', '+b['Longitude']):'Not set')+'</p>'):'<p>Not found</p>';});}if(new URLSearchParams(location.search).get('id')){id.value=new URLSearchParams(location.search).get('id');t();}</script></body></html>
