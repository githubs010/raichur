<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Book | HomeServe</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a class="active" href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Book Service</h1><p>GPS, address and photo can be captured from mobile.</p><div class="form-grid"><label>Name <input id="name" placeholder="Your name"></label><label>Phone <input id="phone" placeholder="Phone number"></label><label>Service<select id="service"><option>Home Cleaning</option><option>Plumbing</option><option>Electrical</option><option>AC Service</option><option>Pest Control</option></select></label><label>Date <input type="date" id="date"></label><label>Slot<select id="slot"><option>09:00 AM - 11:00 AM</option><option>11:00 AM - 01:00 PM</option><option>02:00 PM - 04:00 PM</option><option>04:00 PM - 06:00 PM</option></select></label><label>Payment<select id="payment"><option>UPI</option><option>Cash after service</option></select></label><label>Amount <input id="amount" value="500" type="number"></label><label style="grid-column:1/-1">Address <input id="address" placeholder="Full address"></label><label>Latitude <input id="lat"></label><label>Longitude <input id="lng"></label><label style="grid-column:1/-1">Issue Photo <input type="file" id="photo" accept="image/*" capture="environment"></label><div style="grid-column:1/-1;display:flex;gap:10px;flex-wrap:wrap"><button class="btn" onclick="getGPS()">📍 Detect GPS</button><button class="btn" onclick="fillAddress()">🏠 Fill Address</button><button class="btn p" onclick="bookNow()">✅ Book Now</button></div></div><div id="msg"></div></section></main><script src="api.js"></script><script>document.getElementById('date').valueAsDate=new Date();function getGPS(){if(!navigator.geolocation){showMsg('msg','GPS not supported.',true);return;}showMsg('msg','Detecting GPS...',false);navigator.geolocation.getCurrentPosition(function(pos){lat.value=pos.coords.latitude.toFixed(6);lng.value=pos.coords.longitude.toFixed(6);showMsg('msg','✅ GPS detected.',false);},function(err){showMsg('msg','❌ GPS error: '+err.message,true);},{enableHighAccuracy:true,timeout:10000});}function fillAddress(){if(!lat.value||!lng.value){showMsg('msg','Detect GPS first.',true);return;}showMsg('msg','Address can be typed or pasted from maps.');}function readFileAsDataURL(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});}async function bookNow(){let photoData='';const f=photo.files[0];if(f) photoData=await readFileAsDataURL(f);apiPost({action:'addBooking',name:name.value,phone:phone.value,service:service.value,date:date.value,slot:slot.value,address:address.value,lat:lat.value,lng:lng.value,payment:payment.value,amount:amount.value,photo:photoData},function(err,res){if(err||!res||res.status==='error'){showMsg('msg','❌ '+(res&&res.message?res.message:err),true);return;}showMsg('msg','✅ Booking placed. Booking ID: <b>'+res.bookingId+'</b>',false);});}</script></body></html>
