<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Book</title><link rel='stylesheet' href='style.css'></head><body><header class='top'><div class='wrap nav'><a class='brand' href='index.html'>🏠 HomeServe</a><nav class='links'><a href='book.html' class="active">Book</a><a href='customer.html' >Customer</a><a href='track.html' >Track</a><a href='provider.html' >Provider</a><a href='admin.html' >Admin</a><a href='issues.html' >Issues</a></nav></div></header><main class='wrap'><section class='card'><h1>Book Service</h1><div class='form-grid'><label>Name<input id='n'></label><label>Phone<input id='p'></label><label>Service<select id='s'><option>Home Cleaning</option><option>Plumbing</option><option>Electrical</option></select></label><label>Date<input type='date' id='d'></label><label>Slot<select id='sl'><option>09:00 AM - 11:00 AM</option><option>11:00 AM - 01:00 PM</option></select></label><label style='grid-column:1/-1'>Address<input id='a'></label><label>Amount<input id='amt' value='500'></label><button class='btn p' onclick='go()'>Book Now</button></div><div id='m'></div></section></main><script src='api.js'></script><script>function go(){apiPost({action:'addBooking',name:n.value,phone:p.value,service:s.value,date:d.value,slot:sl.value,address:a.value,payment:'UPI',amount:amt.value},(e,r)=>showMsg('m',r.message+' ID:'+r.bookingId,e));}</script><footer class='wrap' style='padding:20px 0;border-top:1px solid #ddd;margin-top:40px'><p style='color:#999'>HomeServe</p></footer></body></html>
