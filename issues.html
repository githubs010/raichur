<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Issues</title><link rel='stylesheet' href='style.css'></head><body><header class='top'><div class='wrap nav'><a class='brand' href='index.html'>🏠 HomeServe</a><nav class='links'><a href='book.html' >Book</a><a href='customer.html' >Customer</a><a href='track.html' >Track</a><a href='provider.html' >Provider</a><a href='admin.html' >Admin</a><a href='issues.html' class="active">Issues</a></nav></div></header><main class='wrap'><section class='card'><h1>Issues</h1><input id='bid2' placeholder='Booking ID'><input id='cust' placeholder='Customer name'><textarea id='desc' placeholder='Issue'></textarea><button class='btn p' onclick='raiseI()'>Raise Issue</button><button class='btn' onclick='loadIssues()'>Load Issues</button><div id='i'></div></section></main><script src='api.js'></script><script>function raiseI(){apiPost({action:'addIssue',bookingId:bid2.value,customer:cust.value,description:desc.value},(e,r)=>showMsg('i',r.message,e));}function loadIssues(){loading('i');apiGet('getIssues',(e,d)=>{document.getElementById('i').innerHTML=d.map(x=>'<div class="mini"><b>'+x['Issue ID']+'</b> '+x['Booking ID']+' '+badge(x['Status'])+' <input id="r_'+x['Issue ID']+'" placeholder="Resolution"><button class="btn sm" onclick="res(''+x['Issue ID']+'')">Resolve</button></div>').join('')||'<p>No issues</p>';});}function res(id){apiPost({action:'resolveIssue',issueId:id,resolution:document.getElementById('r_'+id).value},()=>loadIssues());}loadIssues();</script><footer class='wrap' style='padding:20px 0;border-top:1px solid #ddd;margin-top:40px'><p style='color:#999'>HomeServe</p></footer></body></html>
