<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Issues | HomeServe</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a href="admin.html">Admin</a><a class="active" href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Issues</h1><input id="bid" placeholder="Booking ID"><input id="cust" placeholder="Customer name"><textarea id="desc" placeholder="Issue"></textarea><input type="file" id="issuePhoto" accept="image/*" capture="environment"><button class="btn p" onclick="raiseI()">Raise Issue</button><button class="btn" onclick="loadIssues()">Load Issues</button><div id="list" style="margin-top:16px"></div></section></main><script src="api.js"></script><script>function readFileAsDataURL(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);});}async function raiseI(){let photo='';const f=issuePhoto.files[0];if(f) photo=await readFileAsDataURL(f);apiPost({action:'addIssue',bookingId:bid.value,customer:cust.value,description:desc.value,photo:photo},function(err,res){showMsg('list',res.message,!!err);loadIssues();});}function loadIssues(){loading('list','Loading issues...');apiGet('getIssues',function(err,data){document.getElementById('list').innerHTML=data.map(i=>'<div class="mini"><strong>'+i["Issue ID"]+'</strong> | '+i["Booking ID"]+' | '+badge(i.Status)+'<br>'+i.Description+'<br><input id="r_'+i["Issue ID"]+'" placeholder="Resolution"><button class="btn sm" onclick="resolve(''+i["Issue ID"]+'')">Resolve</button>'+(i.Photo?'<div style="margin-top:6px"><img src="'+i.Photo+'" style="max-width:160px;border-radius:10px"></div>':'')+'</div>').join('')||'<p>No issues</p>';});}function resolve(id){apiPost({action:'resolveIssue',issueId:id,resolution:document.getElementById('r_'+id).value},function(){loadIssues();});}loadIssues();</script></body></html>
