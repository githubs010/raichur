<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | HomeServe</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a class="active" href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Admin Account</h1><div class="form-grid"><label>Name<input id="aname"></label><label>Email<input id="aemail"></label><label>Password<input id="apass" type="password"></label><button class="btn p" onclick="loginAdmin()">Create / Login Admin</button></div><div id="amsg"></div><hr><button class="btn p" onclick="loadOrders()">Load Orders</button><div id="orders" style="margin-top:16px"></div><hr><h2>Assign Job</h2><input id="bookingId" placeholder="Booking ID"><select id="providerName"><option>Naresh Chandra</option><option>Priya Lakshmi</option><option>Mahesh Kumar</option><option>Raju Babu</option><option>Arjun Reddy</option></select><button class="btn p" onclick="assignJob()">Assign</button><div id="adminMsg"></div></section></main><script src="api.js"></script><script>function loginAdmin(){showMsg('amsg','Admin login ready (backend auth hook).',false);}function loadOrders(){loading('orders','Loading orders...');apiGet('getBookings',function(err,data){document.getElementById('orders').innerHTML=data.map(b=>'<div class="mini"><strong>'+b["Booking ID"]+'</strong> | '+b["Customer Name"]+' | '+b.Service+' | '+badge(b.Status)+'<br><button class="btn sm" onclick="pickBooking(''+b["Booking ID"]+'')">Select</button></div>').join('')||'<p>No orders</p>';});}function pickBooking(id){bookingId.value=id;}function assignJob(){apiPost({action:'assignProvider',bookingId:bookingId.value,provider:providerName.value},function(err,res){showMsg('adminMsg',res.message,!!err);loadOrders();});}loadOrders();</script></body></html>
