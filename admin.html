<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a class="active" href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Admin Review</h1><button class="btn p" onclick="loadQueue()">Load Pending Bookings</button><div id="queue" style="margin-top:16px"></div><hr><h2>Assign by Skill</h2><input id="bookingId" placeholder="Booking ID"><input id="serviceType" placeholder="Service type"><button class="btn" onclick="loadMatchingProviders()">Find Matching Providers</button><div id="matches" style="margin-top:10px"></div><div id="adminMsg"></div></section></main><script src="api.js"></script><script>function loadQueue(){loading('queue');apiGet('getBookings',function(e,d){var q=d.filter(x=>x.Status==='Pending');document.getElementById('queue').innerHTML=q.map(b=>'<div class="mini"><b>'+b['Booking ID']+'</b> | '+b['Customer Name']+' | '+b.Service+'<br><button class="btn sm" onclick="bookingId.value=''+b['Booking ID']+'';serviceType.value=''+b.Service+''">Select</button></div>').join('')||'<p>No pending bookings</p>';});}function loadMatchingProviders(){loading('matches');apiGet('getProviders',function(e,d){var s=(serviceType.value||'').toLowerCase();var m=d.filter(p=>(p.Status||'').toLowerCase()==='active'&&(p.Skill||'').toLowerCase().includes(s));document.getElementById('matches').innerHTML=m.map(p=>'<div class="mini"><b>'+p['Provider ID']+'</b> | '+p.Name+' | '+p.Skill+' | '+p.City+'<br><button class="btn sm" onclick="assignTo(''+p.Name+'')">Assign</button></div>').join('')||'<p>No matching providers</p>';});}function assignTo(name){apiPost({action:'assignProvider',bookingId:bookingId.value,provider:name,status:'Assigned'},function(e,r){showMsg('adminMsg',r.message||'Assigned',!!e);loadQueue();});}loadQueue();</script></body></html>
