<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin | HomeServe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top">
  <div class="wrap nav">
    <a class="brand" href="index.html">🏠 HomeServe</a>
    <nav class="links">
      <a href="book.html">Book</a>
      <a href="customer.html">Customer</a>
      <a href="track.html">Track</a>
      <a href="provider.html">Provider</a>
      <a class="active" href="admin.html">Admin</a>
      <a href="issues.html">Issues</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="card">
    <h1>Admin</h1>
    <button class="btn p" onclick="loadOrders()">Load Orders</button>
    <div id="orders" style="margin-top:16px"></div>

    <hr style="margin:20px 0">

    <h2>Assign Job</h2>
    <input id="bookingId" placeholder="Booking ID" style="margin-bottom:10px">
    <select id="providerName" style="margin-bottom:10px">
      <option>Naresh Chandra</option>
      <option>Priya Lakshmi</option>
      <option>Mahesh Kumar</option>
      <option>Raju Babu</option>
      <option>Arjun Reddy</option>
    </select>
    <button class="btn p" onclick="assignJob()">Assign</button>
    <div id="adminMsg"></div>
  </section>
</main>

<footer class="wrap" style="padding:20px 0;border-top:1px solid #ddd;margin-top:40px">
  <p style="color:#999">HomeServe</p>
</footer>

<script src="api.js"></script>
<script>
function loadOrders() {
  loading('orders', 'Loading orders...');
  apiGet('getBookings', function(err, data) {
    if (err) {
      document.getElementById('orders').innerHTML = '<div class="err">Error: ' + err + '</div>';
      return;
    }
    if (!data.length) {
      document.getElementById('orders').innerHTML = '<div class="msg">No orders found.</div>';
      return;
    }
    document.getElementById('orders').innerHTML = data.map(b => `
      <div class="mini" style="margin-bottom:10px">
        <div><strong>${b['Booking ID']}</strong> | ${b['Customer Name']} | ${b['Service']}</div>
        <div style="font-size:13px;color:#666">Status: ${b['Status']} | Provider: ${b['Provider'] || 'Not Assigned'}</div>
        <button class="btn sm" onclick="pickBooking('${b['Booking ID']}')">Select</button>
      </div>
    `).join('');
  });
}

function pickBooking(id) {
  document.getElementById('bookingId').value = id;
}

function assignJob() {
  const bookingId = document.getElementById('bookingId').value.trim();
  const provider = document.getElementById('providerName').value.trim();
  if (!bookingId) {
    showMsg('adminMsg', 'Please enter Booking ID.', true);
    return;
  }
  showMsg('adminMsg', 'Assigning...', false);
  apiPost({
    action: 'assignProvider',
    bookingId: bookingId,
    provider: provider
  }, function(err, res) {
    if (err || !res || res.status === 'error') {
      showMsg('adminMsg', 'Error: ' + (res && res.message ? res.message : err), true);
      return;
    }
    showMsg('adminMsg', '✅ ' + res.message, false);
    loadOrders();
  });
}

window.onload = loadOrders;
</script>
</body>
</html>
