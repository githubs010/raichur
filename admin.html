<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Admin Panel</h1><button class="btn p" onclick="loadOrders()">Load Orders</button><div id="orders" style="margin-top:16px"></div><hr><h2>Assign Job</h2><input id="bookingId" placeholder="Booking ID"><select id="providerName"></select><button class="btn p" onclick="assignJob()">Assign</button><div id="adminMsg"></div></section></main><footer class="wrap" style="padding:20px 0;border-top:1px solid #ddd;margin-top:40px"><p style="color:#999">HomeServe</p></footer><script src="api.js"></script><script>function loadOrders(){loading('orders');apiGet('getBookings',(e,d)=>{document.getElementById('orders').innerHTML=d.map(b=>'<div class="mini"><strong>'+b["Booking ID"]+'</strong> | '+b["Customer Name"]+' | '+b.Service+' | '+badge(b.Status)+'<br><button class="btn sm" onclick="bookingId.value=''+b["Booking ID"]+''">Select</button></div>').join('')||'<p>No orders</p>';});}function assignJob(){apiPost({action:'assignProvider',bookingId:bookingId.value,provider:providerName.value,status:'Assigned'},(e,res)=>{showMsg('adminMsg',res.message,!!e);loadOrders();});}loadOrders();</script></body></html>
