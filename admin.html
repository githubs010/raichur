<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin</title><link rel='stylesheet' href='style.css'></head><body><header class='top'><div class='wrap nav'><a class='brand' href='index.html'>🏠 HomeServe</a><nav class='links'><a href='book.html' >Book</a><a href='customer.html' >Customer</a><a href='track.html' >Track</a><a href='provider.html' >Provider</a><a href='admin.html' class="active">Admin</a><a href='issues.html' >Issues</a></nav></div></header><main class='wrap'><section class='card'><h1>Admin</h1><button class='btn p' onclick='load()'>Load Orders</button><div id='a'></div><hr><input id='bid' placeholder='Booking ID'><select id='prov'><option>Naresh Chandra</option><option>Priya Lakshmi</option><option>Mahesh Kumar</option></select><button class='btn p' onclick='assign()'>Assign</button><div id='m'></div></section></main><script src='api.js'></script><script>function load(){loading('a');apiGet('getBookings',(e,d)=>{document.getElementById('a').innerHTML=d.map(b=>'<div class="mini"><b>'+b['Booking ID']+'</b> '+b['Customer Name']+' '+badge(b['Status'])+' <button class="btn sm" onclick="sel(''+b['Booking ID']+'')">Select</button></div>').join('')||'<p>No orders</p>';});}function sel(i){bid.value=i;}function assign(){apiPost({action:'assignProvider',bookingId:bid.value,provider:prov.value},(e,r)=>showMsg('m',r.message,e));}load();</script><footer class='wrap' style='padding:20px 0;border-top:1px solid #ddd;margin-top:40px'><p style='color:#999'>HomeServe</p></footer></body></html>
