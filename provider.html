<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Provider</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a class="active" href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Provider</h1><div class="form-grid"><label>Name<input id="pname"></label><label>Password<input id="ppass" type="password"></label><button class="btn p" onclick="loginProvider()">Login</button></div><div id="plog"></div><hr><button class="btn" onclick="loadProviders()">Provider List</button><button class="btn p" onclick="loadJobs()">Load Jobs</button><div id="list" style="margin-top:16px"></div></section></main><script src="api.js"></script><script>function loginProvider(){apiPost({action:'login',role:'provider',name:pname.value,password:ppass.value},function(e,r){showMsg('plog',r.message||'Logged in',!!e);});}function loadProviders(){loading('list');apiGet('getProviders',function(e,d){document.getElementById('list').innerHTML=d.map(p=>'<div class="mini"><strong>'+p.Name+'</strong> | '+p.Skill+' | '+p.City+' | '+badge(p.Status)+'</div>').join('')||'<p>No providers</p>';});}function loadJobs(){var n=(pname.value||'').trim().toLowerCase();if(!n){showMsg('list','Enter provider name',true);return;}loading('list');apiGet('getBookings',function(e,d){var j=d.filter(b=>(b.Provider||'').toLowerCase().includes(n)&&(b.Status==='Assigned'||b.Status==='In Progress'));document.getElementById('list').innerHTML=j.map(b=>'<div class="mini"><strong>'+b['Booking ID']+'</strong> | '+b.Service+' | '+badge(b.Status)+'<br>'+b['Customer Name']+'<br><button class="btn sm" onclick="start(''+b['Booking ID']+'')">Start</button> <button class="btn sm" onclick="done(''+b['Booking ID']+'')">Done</button></div>').join('')||'<p>No jobs</p>';});}function start(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'In Progress'},function(){loadJobs();});}function done(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'Completed'},function(){loadJobs();});}loadProviders();</script></body></html>
