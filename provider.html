<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Provider</title><link rel='stylesheet' href='style.css'></head><body><header class='top'><div class='wrap nav'><a class='brand' href='index.html'>🏠 HomeServe</a><nav class='links'><a href='book.html' >Book</a><a href='customer.html' >Customer</a><a href='track.html' >Track</a><a href='provider.html' class="active">Provider</a><a href='admin.html' >Admin</a><a href='issues.html' >Issues</a></nav></div></header><main class='wrap'><section class='card'><h1>Provider</h1><button class='btn p' onclick='load()'>Load Jobs</button><div id='jobs'></div></section></main><script src='api.js'></script><script>function load(){loading('jobs');apiGet('getBookings',(e,d)=>{document.getElementById('jobs').innerHTML=d.filter(x=>x['Status']=='Assigned'||x['Status']=='In Progress').map(b=>'<div class="mini"><b>'+b['Booking ID']+'</b> '+b['Service']+' '+badge(b['Status'])+' <button class="btn sm" onclick="done(''+b['Booking ID']+'')">Mark Done</button></div>').join('')||'<p>No jobs</p>';});}function done(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'Completed'},()=>load());}load();</script><footer class='wrap' style='padding:20px 0;border-top:1px solid #ddd;margin-top:40px'><p style='color:#999'>HomeServe</p></footer></body></html>
