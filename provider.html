<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Provider Panel | HomeServe</title><link rel='stylesheet' href='style.css'></head><body><header class='top'><div class='wrap nav'>
<a href='index.html' class='brand'>🏠 HomeServe</a>
<nav class='links'>
  <a href='index.html' >Home</a>
  <a href='user.html' >My Bookings</a>
  <a href='book.html' >Book</a>
  <a href='issues.html' >Issues</a>
  <a href='provider.html' class="active">Provider</a>
  <a href='admin.html' >Admin</a>
</nav>
<a href='book.html' class='btn p'>Book Now</a>
</div></header>
<main class='wrap'><section>
  <h1>🔧 Provider Panel</h1>
  <p class='sub'>View jobs assigned to you. Accept, update progress, and mark work as completed.</p>
  <div class='search-row'>
    <input id='pName' placeholder='Enter your name...' style='max-width:260px'>
    <button class='btn p' onclick='loadMyJobs()'>Load My Jobs</button>
    <button class='btn' onclick='loadAll()'>All Assigned Jobs</button>
  </div>
  <div id='provJobs'></div>
</section></main>
<footer class='wrap'><p>🏠 HomeServe — Excel + Google Apps Script powered platform.</p></footer>
<script src='api.js'></script>
<script>
function loadMyJobs(){
  var name = document.getElementById('pName').value.trim().toLowerCase();
  if(!name){showMsg('provJobs','Enter your name first.',true);return;}
  loading('provJobs','Loading your jobs...');
  apiGet('getBookings', function(err, data){
    if(err){document.getElementById('provJobs').innerHTML='<div class="err">Cannot connect.</div>';return;}
    var mine = data.filter(b=>(b['Provider']||'').toLowerCase().includes(name));
    renderJobs(mine);
  });
}
function loadAll(){
  loading('provJobs','Loading assigned jobs...');
  apiGet('getBookings', function(err, data){
    if(err){document.getElementById('provJobs').innerHTML='<div class="err">Cannot connect.</div>';return;}
    var assigned = data.filter(b=>b['Status']==='Assigned'||b['Status']==='In Progress');
    renderJobs(assigned);
  });
}
function renderJobs(jobs){
  if(!jobs.length){document.getElementById('provJobs').innerHTML='<div class="note">No jobs found.</div>';return;}
  document.getElementById('provJobs').innerHTML = jobs.map(b=>
    '<div class="card" style="margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'
    +'<div><h3>'+b['Booking ID']+' — '+b['Service']+'</h3><div class="lbl">'+b['Customer Name']+' | '+b['Phone']+'</div></div>'+badge(b['Status'])+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:12px 0">'
    +'<div><div class="lbl">Date</div>'+b['Date']+'</div>'
    +'<div><div class="lbl">Slot</div>'+b['Time Slot']+'</div>'
    +'<div><div class="lbl">Amount</div>₹'+b['Amount']+'</div></div>'
    +'<div><div class="lbl">Address</div><p style="margin:2px 0">'+b['Address']+'</p></div>'
    +'<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">'
    +'<button class="btn p sm" onclick="updateStatus(''+b['Booking ID']+'','In Progress')">▶ Start Work</button>'
    +'<button class="btn sm" style="background:#437a22;color:#fff;border-color:#437a22" onclick="updateStatus(''+b['Booking ID']+'','Completed')">✓ Mark Done</button>'
    +'</div></div>'
  ).join('');
}
function updateStatus(id, status){
  apiPost({action:'updateBookingStatus', bookingId:id, status:status}, function(err, res){
    if(err||res.status==='error'){alert('Error: '+(res&&res.message||err));return;}
    alert('✓ Status updated to: '+status);
    loadAll();
  });
}
window.onload = loadAll;
</script></body></html>
