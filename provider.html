<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Provider | HomeServe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top">
  <div class="wrap nav">
    <a class="brand" href="index.html">🏠 HomeServe</a>
    <nav class="links">
      <a href="book.html">Book</a>
      <a href="customer.html">Customer</a>
      <a href="track.html">Track</a>
      <a class="active" href="provider.html">Provider</a>
      <a href="admin.html">Admin</a>
      <a href="issues.html">Issues</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="card">
    <h1>Provider</h1>
    <input id="myName" placeholder="Enter your provider name" style="margin-bottom:10px">
    <button class="btn p" onclick="loadJobs()">Load Jobs</button>
    <div id="jobs" style="margin-top:16px"></div>
  </section>
</main>

<footer class="wrap" style="padding:20px 0;border-top:1px solid #ddd;margin-top:40px">
  <p style="color:#999">HomeServe</p>
</footer>

<script src="api.js"></script>
<script>
function loadJobs() {
  const myName = document.getElementById('myName').value.trim().toLowerCase();
  if (!myName) {
    showMsg('jobs', 'Please enter your provider name.', true);
    return;
  }

  loading('jobs', 'Loading jobs...');
  apiGet('getBookings', function(err, data) {
    if (err) {
      document.getElementById('jobs').innerHTML = '<div class="err">Error: ' + err + '</div>';
      return;
    }

    const jobs = data.filter(b => {
      const provider = (b['Provider'] || '').toLowerCase();
      const status = b['Status'];
      return provider.includes(myName) && (status === 'Assigned' || status === 'In Progress');
    });

    if (!jobs.length) {
      document.getElementById('jobs').innerHTML = '<div class="msg">No jobs assigned to you.</div>';
      return;
    }

    document.getElementById('jobs').innerHTML = jobs.map(b => `
      <div class="mini" style="margin-bottom:10px">
        <div><strong>${b['Booking ID']}</strong> | ${b['Service']}</div>
        <div style="font-size:13px;color:#666">Customer: ${b['Customer Name']}</div>
        <div style="font-size:13px;color:#666">Status: ${b['Status']}</div>
        <div style="font-size:13px;color:#666">Address: ${b['Address']}</div>
        <button class="btn sm" onclick="markDone('${b['Booking ID']}')">Mark Done</button>
      </div>
    `).join('');
  });
}

function markDone(bookingId) {
  apiPost({
    action: 'updateBookingStatus',
    bookingId: bookingId,
    status: 'Completed'
  }, function(err, res) {
    if (err || !res || res.status === 'error') {
      alert('Error: ' + (res && res.message ? res.message : err));
      return;
    }
    alert('✅ Job completed');
    loadJobs();
  });
}

window.onload = function() {};
</script>
</body>
</html>
