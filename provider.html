<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Provider | HomeServe</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a class="active" href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Provider Account</h1><div class="form-grid"><label>Name<input id="pname"></label><label>Phone<input id="pphone"></label><label>Email<input id="pemail"></label><label>Password<input id="ppass" type="password"></label><label>Skill<select id="pskill"><option>Plumbing</option><option>Home Cleaning</option><option>Electrical</option><option>AC Service</option><option>Pest Control</option></select></label><label>City<input id="pcity" value="Vijayawada"></label><button class="btn p" onclick="createProvider()">Create Provider</button></div><div id="pmsg"></div><hr><button class="btn" onclick="loadProviders()">Provider List</button> <input id="myName" placeholder="Enter your provider name" style="margin:10px 0"><button class="btn p" onclick="loadJobs()">Load Jobs</button><div id="list" style="margin-top:16px"></div></section></main><script src="api.js"></script><script>function createProvider(){apiPost({action:'registerProvider',name:pname.value,phone:pphone.value,email:pemail.value,password:ppass.value,skill:pskill.value,city:pcity.value},function(err,res){showMsg('pmsg',res.message,!!err);});}function loadProviders(){loading('list','Loading providers...');apiGet('getProviders',function(err,data){document.getElementById('list').innerHTML=data.map(p=>'<div class="mini"><strong>'+p.Name+'</strong> | '+p.Skill+' | '+p.City+' | '+badge(p.Status)+'<br><small>Lat: '+(p.Latitude||'')+' Lng: '+(p.Longitude||'')+'</small></div>').join('')||'<p>No providers</p>';});}function loadJobs(){var n=document.getElementById('myName').value.trim().toLowerCase();if(!n){showMsg('list','Enter provider name',true);return;}loading('list','Loading jobs...');apiGet('getBookings',function(err,data){var j=data.filter(b=>(b.Provider||'').toLowerCase().includes(n)&&(b.Status==='Assigned'||b.Status==='In Progress'));document.getElementById('list').innerHTML=j.map(b=>'<div class="mini"><strong>'+b['Booking ID']+'</strong> | '+b.Service+' | '+badge(b.Status)+'<br>'+b.Customer_Name+'<br><small>Address: '+b.Address+'</small><br><button class="btn sm" onclick="done(''+b['Booking ID']+'')">Mark Done</button></div>').join('')||'<p>No jobs</p>';});}function done(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'Completed'},function(){loadJobs();});}loadProviders();</script></body></html>
