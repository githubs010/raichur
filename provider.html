<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Provider</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="wrap nav"><a class="brand" href="index.html">🏠 HomeServe</a><nav class="links"><a href="book.html">Book</a><a href="customer.html">Customer</a><a href="track.html">Track</a><a href="provider.html">Provider</a><a href="admin.html">Admin</a><a href="issues.html">Issues</a></nav></div></header><main class="wrap"><section class="card"><h1>Provider Panel</h1><button class="btn" onclick="loadProviders()">Provider List</button><input id="myName" placeholder="Enter provider name" style="margin:10px 0"><button class="btn p" onclick="loadJobs()">Load Jobs</button><div id="list" style="margin-top:16px"></div></section></main><footer class="wrap" style="padding:20px 0;border-top:1px solid #ddd;margin-top:40px"><p style="color:#999">HomeServe</p></footer><script src="api.js"></script><script>function loadProviders(){loading('list');apiGet('getProviders',(e,d)=>{document.getElementById('list').innerHTML=d.map(p=>'<div class="mini"><strong>'+p.Name+'</strong> | '+p.Skill+' | '+p.City+' | '+badge(p.Status)+'</div>').join('')||'<p>No providers</p>';});}function loadJobs(){var n=myName.value.trim().toLowerCase();if(!n){showMsg('list','Enter provider name',true);return;}loading('list');apiGet('getBookings',(e,d)=>{var j=d.filter(b=>(b.Provider||'').toLowerCase().includes(n)&&(b.Status==='Assigned'||b.Status==='In Progress'));document.getElementById('list').innerHTML=j.map(b=>'<div class="mini"><strong>'+b['Booking ID']+'</strong> | '+b.Service+' | '+badge(b.Status)+'<br><small>'+b.Address+'</small><br><button class="btn sm" onclick="done(''+b['Booking ID']+'')">Mark Done</button></div>').join('')||'<p>No jobs</p>';});}function start(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'In Progress'},()=>loadJobs());}function done(id){apiPost({action:'updateBookingStatus',bookingId:id,status:'Completed'},()=>loadJobs());}loadProviders();</script></body></html>
